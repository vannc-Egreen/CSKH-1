<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Hệ thống quản lý máy phát</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --bg:#0f172a; --panel:#111827; --card:#1f2937; --line:#334155;
  --text:#e5e7eb; --muted:#94a3b8; --accent:#38bdf8; --accent2:#22d3ee;
  --ok:#10b981; --warn:#f59e0b; --err:#ef4444;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 system-ui,Segoe UI,Roboto,Arial}
header{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}
header h1{font-size:16px;margin:0;flex:1}
nav{display:flex;gap:4px;flex-wrap:wrap}
nav button{background:transparent;color:var(--muted);border:1px solid transparent;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:13px}
nav button.active,nav button:hover{color:var(--text);border-color:var(--line);background:#0b1220}
.badge{background:#0b1220;border:1px solid var(--line);color:var(--muted);padding:2px 8px;border-radius:999px;font-size:12px}
main{padding:16px 20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
.card .lbl{color:var(--muted);font-size:12px}
.card .val{font-size:22px;font-weight:600;margin-top:4px}
.card.ok .val{color:var(--ok)} .card.warn .val{color:var(--warn)} .card.err .val{color:var(--err)}
.grid2{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-top:16px}
@media (max-width:900px){.grid2{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px}
.panel h3{margin:0 0 10px;font-size:14px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
table{width:100%;border-collapse:collapse;font-size:13px}
th,td{padding:6px 8px;border-bottom:1px solid #26324a;text-align:left;vertical-align:top}
th{color:var(--muted);font-weight:600;position:sticky;top:0;background:var(--card);white-space:nowrap}
tr:hover td{background:#0b1220}
.pill{display:inline-block;padding:1px 8px;border-radius:999px;font-size:12px;border:1px solid var(--line);color:var(--muted)}
.pill.ok{color:var(--ok);border-color:#134e4a;background:#022c22}
.pill.warn{color:var(--warn);border-color:#78350f;background:#292014}
.pill.err{color:var(--err);border-color:#7f1d1d;background:#2a1616}
input,select,textarea{background:#0b1220;color:var(--text);border:1px solid var(--line);border-radius:6px;padding:6px 8px;font:inherit;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
button.btn{background:var(--accent);color:#001019;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-weight:600}
button.btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}
button.btn.warn{background:var(--warn);color:#1a1006}
button.btn.err{background:var(--err);color:#fff}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.toolbar > *{flex:0 0 auto}
.toolbar .search{flex:1 1 260px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50}
.overlay.on{display:flex}
.modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;width:min(920px,92vw);max-height:90vh;overflow:auto;padding:16px}
.modal header{background:transparent;border:0;padding:0 0 10px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid label{display:block}
.form-grid label small{color:var(--muted);font-size:11px;display:block;margin-bottom:2px}
.auto{position:relative}
.auto .list{position:absolute;top:100%;left:0;right:0;background:#0b1220;border:1px solid var(--line);border-top:0;max-height:180px;overflow:auto;z-index:5;border-radius:0 0 6px 6px}
.auto .list div{padding:6px 8px;cursor:pointer}
.auto .list div:hover,.auto .list div.hi{background:#1e293b}
.spinner{border:2px solid var(--line);border-top-color:var(--accent);width:18px;height:18px;border-radius:50%;display:inline-block;animation:sp 1s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.status-line{padding:8px 12px;background:var(--panel);color:var(--muted);font-size:12px;border-top:1px solid var(--line);position:sticky;bottom:0}
.mini{color:var(--muted);font-size:12px}
.chart-wrap{position:relative;height:280px}
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:10px}
.tabs button{background:transparent;color:var(--muted);border:0;border-bottom:2px solid transparent;padding:8px 12px;cursor:pointer}
.tabs button.active{color:var(--accent);border-color:var(--accent)}
</style>
</head>
<body>

<header>
  <h1>⚙️ Quản lý máy phát</h1>
  <nav id="nav">
    <button data-page="dashboard" class="active">Dashboard</button>
    <button data-page="master">Danh sách máy</button>
    <button data-page="tracking">Theo dõi bảo dưỡng</button>
    <button data-page="filter">Thay lọc</button>
    <button data-page="spec">Định mức</button>
    <button data-page="alerts">Cảnh báo <span id="alertBadge" class="badge">0</span></button>
    <button data-page="reports">Báo cáo</button>
  </nav>
  <button class="btn ghost" id="btnReload">Tải lại</button>
</header>

<main id="main"></main>

<div class="status-line">
  <span id="status">Đang khởi động…</span>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>

<script>
/* ==================================================================
 *  CẤU HÌNH — DÁN URL WEB APP APPS SCRIPT VÀO ĐÂY
 *  Sau khi Deploy → Web app, copy URL dạng:
 *  https://script.google.com/macros/s/AKfycb..../exec
 * ================================================================== */
const API_URL = 'https://script.google.com/macros/s/AKfycbxwYD64LiU3jWztb1OrxSN5LJuJNAJfK3UbK9k0IZopn8RJLsZQQmX1jGQd7lh1IBgC7A/exec';

/* ============ STATE ============ */
const S = {
  loading:false,
  master:{ headers:[], rows:[] },
  tracking:{ headers:[], rows:[] },
  spec:{ headers:[], rows:[] },
  filter:{ headers:[], rows:[] },
  dropdowns:{},
  alerts:{ alerts:[], towerStates:[] },
  page:'dashboard',
  search:''
};

/* ============ API ============ */
async function apiGet(action, params={}){
  const url = new URL(API_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
  const r = await fetch(url.toString());
  return r.json();
}
async function apiPost(body){
  // dùng text/plain để tránh CORS preflight
  const r = await fetch(API_URL, {
    method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify(body)
  });
  return r.json();
}

/* ============ BOOTSTRAP ============ */
async function loadAll(){
  setStatus('Đang tải dữ liệu…', true);
  try {
    if (API_URL.includes('PASTE_')) {
      throw new Error('Bạn chưa dán URL Apps Script vào biến API_URL trong index.html');
    }
    const d = await apiGet('bootstrap');
    if (!d.ok) throw new Error(d.error||'Lỗi bootstrap');
    S.master = d.master; S.tracking = d.tracking; S.spec = d.spec;
    S.filter = d.filter; S.dropdowns = d.dropdowns; S.alerts = d.alerts;
    document.getElementById('alertBadge').textContent = d.alerts.total || 0;
    setStatus('Đã tải: '+S.master.rows.length+' máy · '+d.alerts.total+' cảnh báo · '+new Date().toLocaleString('vi-VN'));
    render();
  } catch(e){
    setStatus('❌ '+e.message);
  }
}

function setStatus(msg, spin=false){
  document.getElementById('status').innerHTML = (spin?'<span class="spinner"></span> ':'') + msg;
}

/* ============ ROUTER ============ */
document.getElementById('nav').addEventListener('click', e=>{
  const b = e.target.closest('button[data-page]');
  if (!b) return;
  document.querySelectorAll('#nav button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  S.page = b.dataset.page;
  render();
});
document.getElementById('btnReload').onclick = loadAll;

function render(){
  const el = document.getElementById('main');
  switch(S.page){
    case 'dashboard': el.innerHTML = viewDashboard(); afterDashboard(); break;
    case 'master':    el.innerHTML = viewMaster(); afterMaster(); break;
    case 'tracking':  el.innerHTML = viewTracking(); afterTracking(); break;
    case 'filter':    el.innerHTML = viewFilter(); afterFilter(); break;
    case 'spec':      el.innerHTML = viewSpec(); break;
    case 'alerts':    el.innerHTML = viewAlerts(); afterAlerts(); break;
    case 'reports':   el.innerHTML = viewReports(); afterReports(); break;
  }
}

/* ============ DASHBOARD ============ */
function viewDashboard(){
  const m = S.master.rows;
  const active = m.filter(r=>String(r._byLetter.H||'').toLowerCase().includes('bình thường')).length;
  const stopped = m.filter(r=>String(r._byLetter.H||'').toLowerCase().includes('không')).length;
  const notInstalled = m.filter(r=>String(r._byLetter.H||'').toLowerCase().includes('chưa')).length;
  const overdue = S.alerts.alerts.filter(a=>a.type==='overdue').length;
  const dueSoon = S.alerts.alerts.filter(a=>a.type==='due-soon').length;
  const oilHigh = S.alerts.alerts.filter(a=>a.type==='oil-high').length;

  return `
    <div class="cards">
      <div class="card"><div class="lbl">Tổng số máy</div><div class="val">${m.length}</div></div>
      <div class="card ok"><div class="lbl">Hoạt động</div><div class="val">${active}</div></div>
      <div class="card warn"><div class="lbl">Không hoạt động</div><div class="val">${stopped}</div></div>
      <div class="card"><div class="lbl">Chưa lắp đặt</div><div class="val">${notInstalled}</div></div>
      <div class="card err"><div class="lbl">Quá hạn bảo dưỡng</div><div class="val">${overdue}</div></div>
      <div class="card warn"><div class="lbl">Sắp đến hạn</div><div class="val">${dueSoon}</div></div>
      <div class="card err"><div class="lbl">Hao nhớt cao</div><div class="val">${oilHigh}</div></div>
    </div>

    <div class="grid2">
      <div class="panel">
        <h3>Phân bố theo khu vực</h3>
        <div class="chart-wrap"><canvas id="chRegion"></canvas></div>
      </div>
      <div class="panel">
        <h3>Trạng thái</h3>
        <div class="chart-wrap"><canvas id="chStatus"></canvas></div>
      </div>
    </div>

    <div class="grid2">
      <div class="panel">
        <h3>Cảnh báo mới nhất</h3>
        <table><thead><tr><th>Máy</th><th>Loại</th><th>Nội dung</th></tr></thead>
        <tbody>${S.alerts.alerts.slice(0,10).map(a=>`
          <tr><td><b>${esc(a.maCode)}</b><br><span class="mini">${esc(a.site||'')}</span></td>
          <td>${badgeType(a.type)}</td><td>${esc(a.field)}<br><span class="mini">${esc(a.message)}</span></td></tr>
        `).join('') || `<tr><td colspan="3" class="mini">Không có cảnh báo.</td></tr>`}</tbody></table>
      </div>
      <div class="panel">
        <h3>Đơn vị hợp tác</h3>
        <div class="chart-wrap"><canvas id="chPartner"></canvas></div>
      </div>
    </div>
  `;
}
function afterDashboard(){
  const m = S.master.rows;
  const groupBy = (arr, key) => arr.reduce((o,r)=>{const k=String(r._byLetter[key]||'—').trim()||'—';o[k]=(o[k]||0)+1;return o;},{});
  chartPie('chRegion', groupBy(m,'G'));
  chartPie('chStatus', groupBy(m,'H'));
  chartBar('chPartner', groupBy(m,'D'));
}

/* ============ MASTER ============ */
function viewMaster(){
  const h = S.master.headers;
  const rows = filterRows(S.master.rows);
  return `
    <div class="toolbar">
      <input class="search" placeholder="Tìm mã máy, trại, vận hành…" oninput="S.search=this.value;render()" value="${esc(S.search)}"/>
      <button class="btn" onclick="openMasterEdit()">+ Thêm máy</button>
      <button class="btn ghost" onclick="exportCsv('master')">Xuất CSV</button>
    </div>
    <div class="panel" style="padding:0;overflow:auto;max-height:70vh">
    <table>
      <thead><tr>
        <th>Mã máy</th><th>Loại hình</th><th>Đơn vị</th><th>Trại</th>
        <th>Công suất</th><th>Khu vực</th><th>Tỉnh</th><th>Trạng thái</th>
        <th>Vận hành</th><th>SĐT</th><th></th>
      </tr></thead>
      <tbody>${rows.map(r=>`<tr>
        <td><b>${esc(r._byLetter.B)}</b></td>
        <td>${esc(r._byLetter.C)}</td>
        <td>${esc(r._byLetter.D)}</td>
        <td>${esc(r._byLetter.E)}</td>
        <td>${esc(r._byLetter.F)}</td>
        <td>${esc(r._byLetter.G)}</td>
        <td>${esc(r._byLetter.H)}</td>
        <td>${statusPill(r._byLetter.H)}</td>
        <td>${esc(r._byLetter.K)}</td>
        <td>${esc(r._byLetter.L)}</td>
        <td><button class="btn ghost" onclick="openMasterEdit('${esc(r._byLetter.B)}')">Sửa</button></td>
      </tr>`).join('')}</tbody>
    </table></div>
    <div class="mini" style="margin-top:6px">Hiển thị ${rows.length}/${S.master.rows.length} máy</div>
  `;
}
function afterMaster(){}

function openMasterEdit(maCode){
  const row = maCode ? S.master.rows.find(r=>String(r._byLetter.B)===maCode) : null;
  const isNew = !row;
  const val = L => row ? (row._byLetter[L]??'') : '';
  const dd = S.dropdowns;
  const html = `
    <header><h3>${isNew?'Thêm máy mới':'Chỉnh sửa: '+esc(maCode)}</h3></header>
    <div class="form-grid">
      <label><small>Mã máy (B)</small><input id="fB" value="${esc(val('B'))}" ${isNew?'':'readonly'} /></label>
      <label><small>Loại hình (C)</small>${autoInput('fC', val('C'), dd.C?.options||[])}</label>
      <label><small>Đơn vị hợp tác (D)</small>${autoInput('fD', val('D'), dd.D?.options||[])}</label>
      <label><small>Tên trại (E)</small><input id="fE" value="${esc(val('E'))}"/></label>
      <label><small>Công suất TK (F) — chỉ đọc</small><input value="${esc(val('F'))}" readonly/></label>
      <label><small>Khu vực (G)</small>${autoInput('fG', val('G'), dd.G?.options||[])}</label>
      <label><small>Tỉnh thành (H)</small>${autoInput('fH', val('H'), dd.H?.options||[])}</label>
      <label><small>Trạng thái (I)</small><input id="fI" value="${esc(val('I'))}"/></label>
      <label><small>Ngày lắp đặt (J)</small><input id="fJ" type="date" value="${dateVal(val('J'))}"/></label>
      <label><small>Tên vận hành (K)</small><input id="fK" value="${esc(val('K'))}"/></label>
      <label><small>SĐT vận hành (L)</small><input id="fL" value="${esc(val('L'))}"/></label>
      <label><small>Zalo User ID (M)</small><input id="fM" value="${esc(val('M'))}"/></label>
      <label><small>Link Google Maps (N)</small><input id="fN" value="${esc(val('N'))}"/></label>
      <label style="grid-column:1/3"><small>Ghi chú (O)</small><textarea id="fO" rows="2">${esc(val('O'))}</textarea></label>
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
      <button class="btn ghost" onclick="closeOverlay()">Hủy</button>
      <button class="btn" onclick="saveMaster(${isNew?'true':'false'})">Lưu vào Google Sheet</button>
    </div>
  `;
  openOverlay(html);
}

async function saveMaster(isNew){
  const letters = ['B','C','D','E','G','H','I','J','K','L','M','N','O'];
  const data = {};
  letters.forEach(L=>{
    const el = document.getElementById('f'+L);
    if (el) data[L] = el.value;
  });
  setStatus('Đang lưu…', true);
  try{
    let res;
    if (isNew) res = await apiPost({action:'addMachine', data});
    else       res = await apiPost({action:'updateMaster', maCode: data.B, updates: data});
    if (!res.ok) throw new Error(res.error||'Lỗi lưu');
    closeOverlay();
    await loadAll();
  }catch(e){ setStatus('❌ '+e.message); alert(e.message); }
}

/* ============ TRACKING ============ */
function viewTracking(){
  const h = S.tracking.headers.filter(x=>x);
  const rows = filterRows(S.tracking.rows, 'B');
  const show = h.slice(0, 8); // hiển thị 8 cột đầu, còn lại vào modal
  return `
    <div class="toolbar">
      <input class="search" placeholder="Tìm mã máy…" oninput="S.search=this.value;render()" value="${esc(S.search)}"/>
      <button class="btn ghost" onclick="exportCsv('tracking')">Xuất CSV</button>
    </div>
    <div class="panel" style="padding:0;overflow:auto;max-height:70vh"><table>
      <thead><tr>${show.map(x=>`<th>${esc(x)}</th>`).join('')}<th></th></tr></thead>
      <tbody>${rows.map(r=>`<tr>
        ${show.map(hd=>`<td>${esc(r[hd])}</td>`).join('')}
        <td><button class="btn ghost" onclick="openTrackingEdit(${r._row})">Cập nhật</button></td>
      </tr>`).join('')}</tbody>
    </table></div>
  `;
}
function afterTracking(){}

function openTrackingEdit(rowId){
  const row = S.tracking.rows.find(r=>r._row===rowId);
  if (!row) return;
  const headers = S.tracking.headers.filter(x=>x);
  const readonly = h => /theo dõi cảnh báo/i.test(h) || h==='STT' || /^E$/i.test(h);
  const html = `
    <header><h3>Cập nhật theo dõi — dòng ${rowId}, máy ${esc(row._byLetter.B||'')}</h3></header>
    <div class="form-grid">
      ${headers.map((h,i)=>`
        <label>
          <small>${esc(h)} ${readonly(h)?'· chỉ đọc':''}</small>
          <input id="th_${i}" value="${esc(row[h]??'')}" ${readonly(h)?'readonly':''}/>
        </label>`).join('')}
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
      <button class="btn ghost" onclick="closeOverlay()">Hủy</button>
      <button class="btn" onclick="saveTracking(${rowId})">Lưu vào Google Sheet</button>
    </div>`;
  openOverlay(html);
}
async function saveTracking(rowId){
  const headers = S.tracking.headers.filter(x=>x);
  const row = S.tracking.rows.find(r=>r._row===rowId);
  const updates = {};
  headers.forEach((h,i)=>{
    if (/theo dõi cảnh báo/i.test(h)) return;
    const v = document.getElementById('th_'+i).value;
    if (String(v) !== String(row[h]??'')) updates[h] = v;
  });
  if (!Object.keys(updates).length){ closeOverlay(); return; }
  setStatus('Đang lưu…', true);
  const res = await apiPost({action:'updateTracking', row: rowId, updates});
  if (!res.ok) { alert(res.error||'Lỗi'); return; }
  closeOverlay(); await loadAll();
}

/* ============ FILTER ============ */
function viewFilter(){
  const h = S.filter.headers.filter(x=>x);
  const rows = filterRows(S.filter.rows, 'B');
  return `
    <div class="toolbar">
      <input class="search" placeholder="Tìm mã máy…" oninput="S.search=this.value;render()" value="${esc(S.search)}"/>
    </div>
    <div class="panel" style="padding:0;overflow:auto;max-height:70vh"><table>
      <thead><tr>${h.slice(0,10).map(x=>`<th>${esc(x)}</th>`).join('')}<th></th></tr></thead>
      <tbody>${rows.map(r=>`<tr>
        ${h.slice(0,10).map(hd=>`<td>${esc(r[hd])}</td>`).join('')}
        <td><button class="btn ghost" onclick="openFilterEdit(${r._row})">Cập nhật</button></td>
      </tr>`).join('')}</tbody>
    </table></div>
  `;
}
function afterFilter(){}

function openFilterEdit(rowId){
  const row = S.filter.rows.find(r=>r._row===rowId);
  const headers = S.filter.headers.filter(x=>x);
  const states = S.alerts.towerStates || [];
  const html = `
    <header><h3>Data thay lọc — dòng ${rowId}</h3></header>
    <div class="form-grid">
      ${headers.map((h,i)=>{
        const val = row[h]??'';
        // cột trạng thái tháp lọc: dùng select từ towerStates
        const isState = /trạng thái/i.test(h) || i===12; // cột M (index 12)
        if (isState && states.length){
          return `<label><small>${esc(h)}</small>
            <select id="ff_${i}">${['',...states].map(s=>`<option ${String(val)===String(s)?'selected':''}>${esc(s)}</option>`).join('')}</select>
          </label>`;
        }
        return `<label><small>${esc(h)}</small><input id="ff_${i}" value="${esc(val)}"/></label>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
      <button class="btn ghost" onclick="closeOverlay()">Hủy</button>
      <button class="btn" onclick="saveFilter(${rowId})">Lưu</button>
    </div>`;
  openOverlay(html);
}
async function saveFilter(rowId){
  const headers = S.filter.headers.filter(x=>x);
  const row = S.filter.rows.find(r=>r._row===rowId);
  const updates = {};
  headers.forEach((h,i)=>{
    const el = document.getElementById('ff_'+i); if (!el) return;
    const v = el.value;
    if (String(v)!==String(row[h]??'')) updates[h]=v;
  });
  if (!Object.keys(updates).length){ closeOverlay(); return; }
  const res = await apiPost({action:'updateFilter', row: rowId, updates});
  if (!res.ok) return alert(res.error||'Lỗi');
  closeOverlay(); await loadAll();
}

/* ============ CHART HELPERS ============ */
function chartPie(id, data){
  const el = document.getElementById(id); if (!el) return;
  if (el._chart) el._chart.destroy();
  el._chart = new Chart(el, {
    type:'doughnut',
    data:{ labels:Object.keys(data), datasets:[{ data:Object.values(data),
      backgroundColor:['#38bdf8','#22d3ee','#f59e0b','#10b981','#ef4444','#a78bfa','#f472b6','#facc15','#34d399','#60a5fa'] }] },
    options:{ maintainAspectRatio:false, plugins:{ legend:{ position:'bottom', labels:{color:'#cbd5e1'} } } }
  });
}
function chartBar(id, data){
  const el = document.getElementById(id); if (!el) return;
  if (el._chart) el._chart.destroy();
  el._chart = new Chart(el, {
    type:'bar',
    data:{ labels:Object.keys(data), datasets:[{ label:'', data:Object.values(data), backgroundColor:'#38bdf8' }] },
    options:{ maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{ticks:{color:'#94a3b8'}}, y:{ticks:{color:'#94a3b8'}} } }
  });
}

/* ============ AUTOCOMPLETE ============ */
function autoInput(id, value, options){
  return `
    <div class="auto">
      <input id="${id}" autocomplete="off" value="${esc(value)}" oninput="acInput(this,'${id}')" onfocus="acShow(this,'${id}')" onblur="setTimeout(()=>acHide('${id}'),150)" />
      <div class="list" id="${id}_list" style="display:none" data-opts='${esc(JSON.stringify(options))}'></div>
    </div>`;
}
function acShow(input, id){ acFilter(input, id); }
function acHide(id){ const l=document.getElementById(id+'_list'); if (l) l.style.display='none'; }
function acInput(input, id){ acFilter(input, id); }
function acFilter(input, id){
  const l = document.getElementById(id+'_list'); if (!l) return;
  const opts = JSON.parse(l.dataset.opts);
  const q = input.value.trim().toLowerCase();
  const filtered = opts.filter(o=>o.toLowerCase().includes(q)).slice(0,20);
  l.innerHTML = filtered.map(o=>`<div onmousedown="document.getElementById('${id}').value=this.textContent;acHide('${id}')">${esc(o)}</div>`).join('');
  l.style.display = filtered.length? 'block':'none';
}

/* ============ UTIL ============ */
function esc(s){ if (s===null||s===undefined) return ''; return String(s).replace(/[&<>"']/g,c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function dateVal(v){ if (!v) return ''; const d=new Date(v); if (isNaN(d)) return ''; return d.toISOString().slice(0,10); }
function statusPill(s){
  s=String(s||'').toLowerCase();
  if (s.includes('bình thường')) return '<span class="pill ok">Hoạt động</span>';
  if (s.includes('không')) return '<span class="pill err">Dừng</span>';
  if (s.includes('chưa')) return '<span class="pill">Chưa lắp</span>';
  return '<span class="pill">'+esc(s)+'</span>';
}
function badgeType(t){
  if (t==='overdue') return '<span class="pill err">Quá hạn</span>';
  if (t==='due-soon') return '<span class="pill warn">Sắp đến hạn</span>';
  if (t==='oil-high') return '<span class="pill err">Hao nhớt</span>';
  return '<span class="pill">'+esc(t)+'</span>';
}
function filterRows(rows, matchLetter='B'){
  if (!S.search) return rows;
  const q = S.search.toLowerCase();
  return rows.filter(r=>Object.values(r._byLetter||{}).some(v=>String(v??'').toLowerCase().includes(q)));
}
function openOverlay(html){
  document.getElementById('modal').innerHTML = html;
  document.getElementById('overlay').classList.add('on');
}
function closeOverlay(){ document.getElementById('overlay').classList.remove('on'); }
document.getElementById('overlay').addEventListener('click', e=>{ if (e.target.id==='overlay') closeOverlay(); });

function exportCsv(which){
  const src = which==='master'? S.master : S.tracking;
  const h = src.headers.filter(x=>x);
  const lines = [h.join(',')].concat(src.rows.map(r=>h.map(hd=>{
    let v = r[hd]; if (v===null||v===undefined) v=''; v=String(v).replace(/"/g,'""');
    return /[",\n]/.test(v)? `"${v}"` : v;
  }).join(',')));
  const blob = new Blob([lines.join('\n')], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download = which+'.csv'; a.click(); URL.revokeObjectURL(url);
}
